<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#2563eb">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="ControlDesk">
    <link rel="apple-touch-icon" href="/static/icons/icon-192x192.png">
    <link rel="manifest" href="/manifest.json">

    <title>{% block title %}ControlDesk Admin{% endblock %}</title>
    
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Custom Tailwind Config -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: {
                            50: '#eff6ff',
                            500: '#3b82f6',
                            600: '#2563eb',
                            700: '#1d4ed8',
                            800: '#1e40af',
                            900: '#1e3a8a',
                        }
                    }
                }
            }
        }
    </script>
    
    {% block extra_css %}{% endblock %}
</head>
<body class="bg-gray-50 font-sans antialiased">
    
    <!-- Mobile menu backdrop -->
    <div id="admin-mobile-menu-backdrop" class="fixed inset-0 bg-black bg-opacity-50 z-40 hidden lg:hidden"></div>
    
    <!-- Main Container -->
    <div class="flex h-screen">
        
        <!-- Admin Sidebar -->
        <aside id="admin-sidebar" class="fixed top-0 left-0 z-50 w-64 h-screen bg-white shadow-lg flex flex-col flex-shrink-0 transform -translate-x-full transition-transform duration-300 ease-in-out lg:translate-x-0">
            
            <!-- Sidebar Header -->
            <div class="flex items-center justify-center h-16 px-6 border-b border-gray-200 flex-shrink-0">
                <div class="flex items-center space-x-3">
                    <div class="w-8 h-8 bg-primary-600 rounded-lg flex items-center justify-center flex-shrink-0">
                        <i class="fas fa-user-shield text-white text-sm"></i>
                    </div>
                    <h1 class="text-xl font-bold text-gray-800">ControlDesk</h1>
                </div>
            </div>
            
            <!-- Navigation Menu -->
            <nav class="mt-6 px-4 flex-1 overflow-y-auto">
                <ul class="space-y-2">
                    
                    <!-- Dashboard -->
                    <li>
                        <a href="{{ url_for('admin.dashboard') }}" class="nav-item flex items-center px-4 py-3 text-gray-700 rounded-lg hover:bg-primary-50 hover:text-primary-600 transition-colors duration-200 group">
                            <i class="fas fa-tachometer-alt w-5 h-5 mr-3 text-gray-400 group-hover:text-primary-600 flex-shrink-0"></i>
                            <span class="font-medium">Dashboard</span>
                        </a>
                    </li>
                    
                    <!-- Empresas -->
                    <li>
                        <a href="{{ url_for('admin.empresas_list') }}" class="nav-item flex items-center px-4 py-3 text-gray-700 rounded-lg hover:bg-primary-50 hover:text-primary-600 transition-colors duration-200 group">
                            <i class="fas fa-building w-5 h-5 mr-3 text-gray-400 group-hover:text-primary-600 flex-shrink-0"></i>
                            <span class="font-medium">Empresas</span>
                        </a>
                    </li>
                    
                    <!-- Planes -->
                    <li>
                        <a href="{{ url_for('admin.planes_list') }}" class="nav-item flex items-center px-4 py-3 text-gray-700 rounded-lg hover:bg-primary-50 hover:text-primary-600 transition-colors duration-200 group">
                            <i class="fas fa-credit-card w-5 h-5 mr-3 text-gray-400 group-hover:text-primary-600 flex-shrink-0"></i>
                            <span class="font-medium">Planes</span>
                        </a>
                    </li>
                </ul>
            </nav>
            
            <!-- User Section -->
            <div class="p-4 border-t border-gray-200 flex-shrink-0">
                <div class="flex items-center justify-between">
                    <div class="flex items-center">
                        <div class="w-10 h-10 bg-primary-100 rounded-full flex items-center justify-center">
                            <i class="fas fa-user-shield text-primary-600"></i>
                        </div>
                        <div class="ml-3">
                            <p class="text-sm font-medium text-gray-700">Administrador</p>
                            <p class="text-xs text-gray-500">ControlDesk</p>
                        </div>
                    </div>
                    <a href="{{ url_for('main.logout') }}" class="text-gray-400 hover:text-red-600 transition-colors" title="Cerrar Sesión">
                        <i class="fas fa-sign-out-alt text-lg"></i>
                    </a>
                </div>
            </div>
        </aside>
        
        <!-- Main Content -->
        <div class="flex-1 flex flex-col min-w-0 lg:ml-64">
            <!-- Mobile Topbar -->
            <header class="sticky top-0 z-30 bg-white shadow-sm border-b border-gray-200 lg:hidden">
                <div class="flex items-center justify-between h-16 px-4">
                    <button id="admin-mobile-menu-button" class="p-2 rounded-lg text-gray-600 hover:text-gray-900 hover:bg-gray-100 focus:outline-none focus:ring-2 focus:ring-primary-500">
                        <i class="fas fa-bars text-xl"></i>
                    </button>
                    <div class="flex items-center space-x-2">
                        <div class="w-8 h-8 bg-primary-600 rounded-lg flex items-center justify-center">
                            <i class="fas fa-user-shield text-white text-sm"></i>
                        </div>
                        <span class="text-lg font-bold text-gray-800">ControlDesk</span>
                    </div>
                    <a href="{{ url_for('main.logout') }}" class="p-2 rounded-lg text-gray-500 hover:text-red-600 hover:bg-red-50 transition-colors" title="Cerrar Sesión">
                        <i class="fas fa-sign-out-alt text-lg"></i>
                    </a>
                </div>
            </header>

            <main class="flex-1 overflow-y-auto">
                {% block content %}{% endblock %}
            </main>
        </div>
    </div>
    
    <script>
        const adminMobileMenuButton = document.getElementById('admin-mobile-menu-button');
        const adminSidebar = document.getElementById('admin-sidebar');
        const adminBackdrop = document.getElementById('admin-mobile-menu-backdrop');
        
        if (adminMobileMenuButton && adminSidebar && adminBackdrop) {
            adminMobileMenuButton.addEventListener('click', () => {
                adminSidebar.classList.toggle('-translate-x-full');
                adminBackdrop.classList.toggle('hidden');
            });
            
            adminBackdrop.addEventListener('click', () => {
                adminSidebar.classList.add('-translate-x-full');
                adminBackdrop.classList.add('hidden');
            });
            
            document.querySelectorAll('#admin-sidebar .nav-item').forEach(item => {
                item.addEventListener('click', () => {
                    if (window.innerWidth < 1024) {
                        adminSidebar.classList.add('-translate-x-full');
                        adminBackdrop.classList.add('hidden');
                    }
                });
            });
        }
    </script>
    
    {% block extra_js %}{% endblock %}

    <!-- PWA Service Worker Registration -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', function() {
                navigator.serviceWorker.register('/sw.js', { scope: '/' })
                    .then(function(registration) {
                        console.log('[PWA] Service Worker registered, scope:', registration.scope);
                    })
                    .catch(function(err) {
                        console.error('[PWA] Service Worker registration failed:', err);
                    });
            });
        }
    </script>
</body>
</html>
